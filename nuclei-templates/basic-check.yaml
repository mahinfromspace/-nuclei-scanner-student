id: basic-http-check

info:
  name: Website Is Reachable
  author: student
  severity: info
  description: The target website responded to an HTTP request.

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: dsl
        dsl:
          - "status_code >= 100 && status_code < 600"
